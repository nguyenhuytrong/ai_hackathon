services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: carebridge-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-carebridge}
      POSTGRES_USER: ${POSTGRES_USER:-carebridge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-carebridge_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - carebridge_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  carebridge_postgres_data:
